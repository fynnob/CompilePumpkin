name: Build Pumpkin for Termux (Native Android patched)

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Clone Pumpkin
        run: |
          git clone --recurse-submodules --depth 1 --branch nightly https://github.com/Pumpkin-MC/Pumpkin.git pumpkin-src
          cd pumpkin-src
          echo "COMMIT=$(git rev-parse --short HEAD)" >> $GITHUB_ENV

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android

      - name: Set up Android NDK
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: r26d

      - name: Configure cargo for Android target
        run: |
          echo "[target.aarch64-linux-android]" >> ~/.cargo/config.toml
          echo "linker = \"${{ steps.setup-ndk.outputs.ndk-path }}/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android24-clang\"" >> ~/.cargo/config.toml

      - name: Force System Allocator (Bionic libc fix)
        working-directory: pumpkin-src
        run: |
          # Strip custom allocators across all crates to prevent Android underflows
          find . -name "Cargo.toml" -type f -exec sed -i 's/mimalloc = .*/# mimalloc removed/' {} +
          find . -name "Cargo.toml" -type f -exec sed -i 's/jemalloc = .*/# jemalloc removed/' {} +
          find . -name "Cargo.toml" -type f -exec sed -i 's/"mimalloc"//g' {} +
          find . -name "Cargo.toml" -type f -exec sed -i 's/"jemalloc"//g' {} +

      - name: Dynamically Patch Negative Chunk Bug
        working-directory: pumpkin-src
        run: |
          # Replace unsafe modulo math with safe Euclidean math across all Rust files
          find . -name "*.rs" -type f -exec sed -i 's/% 16/.rem_euclid(16)/g' {} +
          find . -name "*.rs" -type f -exec sed -i 's/% 32/.rem_euclid(32)/g' {} +
          
          # Optional failsafe: cast dangerous 'as usize' conversions
          find . -name "*.rs" -type f -exec sed -i 's/as usize/.unsigned_abs() as usize/g' {} +

      - name: Build
        working-directory: pumpkin-src
        env:
          CC_aarch64_linux_android: ${{ steps.setup-ndk.outputs.ndk-path }}/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android24-clang
          AR_aarch64_linux_android: ${{ steps.setup-ndk.outputs.ndk-path }}/toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-ar
        run: cargo build --release --target aarch64-linux-android

      - name: Package
        run: |
          mkdir out
          cp pumpkin-src/target/aarch64-linux-android/release/pumpkin out/pumpkin-termux-aarch64 || \
          cp pumpkin-src/target/aarch64-linux-android/release/pumpkin-* out/ 2>/dev/null || true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}-${{ env.COMMIT }}
          name: Pumpkin Termux build ${{ env.COMMIT }}
          files: out/*
